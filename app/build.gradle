apply plugin: 'com.android.application'

android {
    ndkVersion "29.0.14206865"
    ndkPath "S:/Projects/Android/NDK/android-ndk-r29-windows/android-ndk-r29"
    compileSdk 36
    defaultConfig {
        applicationId "com.android.support"
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "1.0"
        ndk {
            //noinspection ChromeOsAbiSupport
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
    }
    android.buildFeatures.buildConfig = true
    buildTypes {
        release {
            shrinkResources false
            minifyEnabled false
        }
        debug {
            shrinkResources false
            minifyEnabled false
        }
    }
    externalNativeBuild {
        ndkBuild {
            path file('src/main/jni/Android.mk')
        }
    }
    namespace 'com.android.support'
}

//dependencies must be placed below 'android' brackets to get it work on AIDE
dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}